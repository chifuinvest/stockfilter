# Streamlit 全局配置（个股财报+技术面综合分析系统）
[server]
# Streamlit 监听地址和端口（Community Cloud 会自动注入 $PORT，不用硬写）
headless = true
address = "0.0.0.0"
# 上传文件大小限制
maxUploadSize = 50
# 文件监视（开发模式），部署后关闭
fileWatcherType = "none"
# 跨域（内嵌 iframe 用）
enableCORS = false
enableXsrfProtection = false

[runner]
# 魔法命令：st.rerun / st.stop 等正常工作
magicEnabled = true
fastReruns = true

[theme]
# 蓝色系金融科技主题，和分析结果的买入/卖出颜色匹配
base = "light"
primaryColor = "#1f77b4"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f5f9ff"
textColor = "#1f2937"
font = "sans serif"

[browser]
# 不收集使用统计，关闭本地地址硬写（部署到云端会自动用正确域名）
gatherUsageStats = false

[client]
# 生产部署：错误详情默认显示方便排错，工具栏精简
showErrorDetails = true
toolbarMode = "minimal"
# 去掉默认 Streamlit 菜单（可选，部署后想隐藏水印/菜单可再开启）
# toolbarMode = "viewer"

